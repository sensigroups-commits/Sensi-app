<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎬 سینما کانال | نسخه نهایی رفع باگ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazir', 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --accent-gold: #d4a500;
            --accent-gold-light: #ffd700;
            --card-bg: #ffffff;
            --input-bg: #f1f5f9;
            --hero-overlay: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.6) 50%, #f5f7fa 100%);
            --hero-text: #1e293b;
            --glow-title: #d4a500;
            --comment-bg: #ffffff;
            --comment-border: #e2e8f0;
            --icon-bg: #ffffff;
            --icon-fill: #d4a500;
            --toast-bg: rgba(255, 255, 255, 0.95);
            --toast-text: #1e293b;
            --toast-border: #e2e8f0;
            --toast-success: #10b981;
            --toast-warning: #f59e0b;
            --header-bg: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            --bg-primary: #0a0c14;
            --bg-secondary: #151e2f;
            --bg-card: rgba(20, 30, 45, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #e0e7ff;
            --text-muted: #9aa9c1;
            --border-color: #2d3748;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --accent-gold: #ffd700;
            --accent-gold-light: #ffaa00;
            --card-bg: #1e2a3a;
            --input-bg: #1e2842;
            --hero-overlay: radial-gradient(circle at 30% 50%, rgba(255,215,0,0.15) 0%, transparent 60%),
                            linear-gradient(180deg, rgba(10,12,20,0.9) 0%, rgba(10,12,20,0.6) 50%, #0a0c14 100%);
            --hero-text: #ffffff;
            --comment-bg: #1a233a;
            --comment-border: #2d3e62;
            --icon-bg: #1e2a3a;
            --icon-fill: #ffd700;
            --toast-bg: rgba(30, 40, 60, 0.95);
            --toast-text: #ffffff;
            --toast-border: #2d3e62;
            --toast-success: #10b981;
            --toast-warning: #f59e0b;
            --header-bg: rgba(10, 12, 20, 0.8);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.2s ease;
            overflow-x: hidden;
        }

        /* ===== هدر بالای صفحه ===== */
        .top-header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-right {
            display: flex;
            align-items: center;
        }

        .header-logo {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 20px;
            text-shadow: 0 0 10px var(--accent-gold);
        }

        /* ===== دکمه دارک/لایت ثابت (همون استایل قبلی) ===== */
        .theme-switch-wrapper {
            display: flex;
            background: var(--icon-bg);
            backdrop-filter: blur(10px);
            padding: 5px;
            border-radius: 60px;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold);
        }

        .theme-switch {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            overflow: hidden;
        }

        .sun-icon {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: #fbbf24;
            stroke-width: 2;
            stroke-linecap: round;
            transition: all 0.3s ease;
        }

        .sun-icon circle {
            fill: #fbbf24;
            stroke: #fbbf24;
        }

        .sun-icon line {
            stroke: #fbbf24;
        }

        .moon-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #94a3b8;
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .moon-icon path {
            fill: #94a3b8;
            stroke: #94a3b8;
        }

        .theme-btn.active {
            background: var(--accent-gold);
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--accent-gold);
        }

        .theme-btn.active .sun-icon,
        .theme-btn.active .moon-icon {
            stroke: #0a0c14;
            fill: #0a0c14;
        }

        .theme-btn:hover {
            transform: rotate(15deg) scale(1.1);
        }

        .theme-btn.active:hover {
            transform: rotate(0) scale(1.15);
        }

        /* ===== نوتیفیکیشن (رفع مشکل کج شدن) ===== */
        .notification-bell {
            cursor: pointer;
            position: relative;
        }

        .bell-icon {
            width: 45px;
            height: 45px;
            background: var(--icon-bg);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold);
            transition: all 0.3s ease;
            position: relative;
        }

        .bell-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--icon-fill);
            stroke: var(--icon-fill);
            transition: transform 0.3s ease;
        }

        /* هاور فقط باعث کج شدن میشه */
        .bell-icon:hover svg {
            transform: rotate(15deg);
        }

        /* بعد از کلیک، کج نمیمونه */
        .notification-bell:active svg {
            transform: rotate(0deg);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: bold;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--bg-primary);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* ===== پنل نوتیفیکیشن ===== */
        .notification-panel {
            position: fixed;
            top: 70px;
            left: 20px;
            width: 350px;
            max-height: 500px;
            background: var(--toast-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--accent-gold);
            box-shadow: 0 20px 40px var(--shadow-color);
            z-index: 9999;
            overflow: hidden;
            transform: translateX(-120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .notification-panel.show {
            transform: translateX(0);
        }

        .notification-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--header-bg);
        }

        .notification-panel-header h3 {
            color: var(--accent-gold);
            font-size: 18px;
            font-weight: 700;
        }

        .notification-panel-header button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            padding: 5px 10px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .notification-panel-header button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .notification-list {
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .notification-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            cursor: pointer;
        }

        .notification-item:hover {
            transform: translateX(-5px);
            border-color: var(--accent-gold);
        }

        .notification-item.unread {
            border-right: 4px solid var(--accent-gold);
            background: var(--icon-bg);
        }

        .notification-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg);
            border: 2px solid var(--accent-gold);
        }

        .notification-item-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--icon-fill);
            stroke: var(--icon-fill);
        }

        .notification-item-content {
            flex: 1;
        }

        .notification-item-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .notification-item-message {
            color: var(--text-muted);
            font-size: 12px;
        }

        .notification-item-time {
            color: var(--text-muted);
            font-size: 10px;
            margin-top: 4px;
        }

        /* ===== بقیه استایل‌ها مثل قبل ===== */
        .cinema-hero {
            position: relative;
            width: 100%;
            height: 480px;
            background: linear-gradient(145deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 25px 50px -8px var(--shadow-color);
        }

        .hero-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            filter: blur(3px) brightness(0.7);
            z-index: 0;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--hero-overlay);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: var(--hero-text);
            padding: 20px;
        }

        .glow-title {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--accent-gold), 0 0 20px var(--accent-gold);
            background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 16px 80px;
        }

        .section-title {
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 700;
            margin: 40px 0 30px;
            border-right: 6px solid var(--accent-gold);
            padding-right: 20px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }

        .modern-card {
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px -15px var(--shadow-color);
            transition: all 0.4s ease;
        }

        .modern-card:hover {
            transform: translateY(-12px);
            border-color: var(--accent-gold);
        }

        .card-image {
            height: 200px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer {
            color: var(--text-muted);
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--border-color);
            margin-top: 50px;
        }

        @media (max-width: 600px) {
            .theme-btn {
                width: 38px;
                height: 38px;
            }
            
            .bell-icon {
                width: 38px;
                height: 38px;
            }
            
            .glow-title { font-size: 36px; }
            .cards-grid { grid-template-columns: 1fr; }
            .notification-panel {
                left: 10px;
                right: 10px;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- ===== هدر بالای صفحه ===== -->
    <header class="top-header">
        <div class="header-right">
            <span class="header-logo">🎬 سینما کانال</span>
        </div>
        <div class="header-left">
            <!-- نوتیفیکیشن -->
            <div class="notification-bell" id="notificationBell">
                <div class="bell-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                    <span class="notification-badge" id="notificationBadge">۰</span>
                </div>
            </div>
            
            <!-- دکمه دارک/لایت ثابت (همون استایل قبلی) -->
            <div class="theme-switch-wrapper">
                <div class="theme-switch">
                    <button class="theme-btn" id="lightThemeBtn" title="تم روشن">
                        <svg class="sun-icon" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                    </button>
                    <button class="theme-btn" id="darkThemeBtn" title="تم تاریک">
                        <svg class="moon-icon" viewBox="0 0 24 24">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== پنل نوتیفیکیشن ===== -->
    <div class="notification-panel" id="notificationPanel">
        <div class="notification-panel-header">
            <h3>اعلان‌ها</h3>
            <button id="closeNotificationPanel">✕</button>
        </div>
        <div class="notification-list" id="notificationList"></div>
    </div>

    <!-- ===== هدر سینمایی ===== -->
    <header class="cinema-hero">
        <video class="hero-video-bg" autoplay muted loop playsinline>
            <source src="https://videos.pexels.com/video-files/852421/852421-hd_1920_1080_30fps.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="glow-title">سینما کانال</h1>
            <div class="subtitle">Cinematic Experience</div>
            <div class="hero-badge">⭐ جدیدترین فیلم‌ها و آهنگ‌ها ⭐</div>
        </div>
    </header>

    <!-- محتوای اصلی -->
    <main class="content">
        <h2 class="section-title">🔥 آخرین آثار</h2>
        <div class="cards-grid">
            <div class="modern-card">
                <div class="card-image" style="font-size:40px; color:var(--accent-gold);">🎬</div>
                <div style="padding:20px">
                    <h3 style="color:var(--text-primary)">اوپنهایمر</h3>
                    <p style="color:var(--text-muted)">⭐ 8.9 • ۱۸۰ دقیقه</p>
                </div>
            </div>
            <div class="modern-card">
                <div class="card-image" style="font-size:40px; color:var(--accent-gold);">🎵</div>
                <div style="padding:20px">
                    <h3 style="color:var(--text-primary)">شهر خاموش</h3>
                    <p style="color:var(--text-muted)">👥 ۲.۵M • ۴:۳۲</p>
                </div>
            </div>
        </div>

        <div class="footer">✨ سینما در جیب شما ✨</div>
    </main>

    <script>
        (function() {
            // ===== تم =====
            let currentTheme = localStorage.getItem('cinema-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);

            const lightBtn = document.getElementById('lightThemeBtn');
            const darkBtn = document.getElementById('darkThemeBtn');
            
            function updateActiveButton(theme) {
                if (theme === 'light') {
                    lightBtn.classList.add('active');
                    darkBtn.classList.remove('active');
                } else {
                    darkBtn.classList.add('active');
                    lightBtn.classList.remove('active');
                }
            }
            
            updateActiveButton(currentTheme);

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('cinema-theme', theme);
                updateActiveButton(theme);
            }

            lightBtn.addEventListener('click', () => setTheme('light'));
            darkBtn.addEventListener('click', () => setTheme('dark'));

            // ===== نوتیفیکیشن =====
            let notificationPanelOpen = false;
            const notifications = [
                { id: 1, type: 'film', title: 'فیلم جدید', message: 'اوپنهایمر اضافه شد', read: false, time: new Date() },
                { id: 2, type: 'music', title: 'آهنگ جدید', message: 'شهر خاموش منتشر شد', read: false, time: new Date() }
            ];

            function updateNotificationBadge() {
                const badge = document.getElementById('notificationBadge');
                const unreadCount = notifications.filter(n => !n.read).length;
                badge.textContent = unreadCount;
                badge.style.display = unreadCount > 0 ? 'flex' : 'none';
            }

            function renderNotificationPanel() {
                const panel = document.getElementById('notificationList');
                let html = '';
                notifications.slice().reverse().forEach(n => {
                    const icon = n.type === 'film' 
                        ? '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2" fill="currentColor"/><polygon points="8 6 18 12 8 18 8 6" fill="var(--bg-primary)"/></svg>'
                        : '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><circle cx="8" cy="18" r="4"/><circle cx="18" cy="16" r="4"/><path d="M8 14V5L20 3V13"/><line x1="8" y1="10" x2="20" y2="8"/></svg>';
                    html += `
                        <div class="notification-item ${!n.read ? 'unread' : ''}" data-id="${n.id}">
                            <div class="notification-item-icon">${icon}</div>
                            <div class="notification-item-content">
                                <div class="notification-item-title">${n.title}</div>
                                <div class="notification-item-message">${n.message}</div>
                            </div>
                        </div>
                    `;
                });
                panel.innerHTML = html || '<div style="padding:20px; text-align:center">نوتیفیکیشنی نیست</div>';
            }

            function toggleNotificationPanel() {
                const panel = document.getElementById('notificationPanel');
                notificationPanelOpen = !notificationPanelOpen;
                panel.classList.toggle('show', notificationPanelOpen);
            }

            document.getElementById('notificationBell').addEventListener('click', toggleNotificationPanel);
            document.getElementById('closeNotificationPanel').addEventListener('click', toggleNotificationPanel);

            document.addEventListener('click', function(e) {
                const panel = document.getElementById('notificationPanel');
                const bell = document.getElementById('notificationBell');
                if (notificationPanelOpen && !panel.contains(e.target) && !bell.contains(e.target)) {
                    toggleNotificationPanel();
                }
            });

            // مقداردهی اولیه
            updateNotificationBadge();
            renderNotificationPanel();
        })();
    </script>
</body>
</html>
